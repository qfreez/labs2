<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket Chat</title>
</head>
<body>
    <h1>Чат на WebSockets</h1>
    <input type="text" id="username" placeholder="Имя">
    <button onclick="connect()">Войти</button>

    <div id="chat" style="display:none">
        <input type="text" id="messageInput" autocomplete="off" placeholder="Введите сообщение">
        <button onclick="send()">Отправить</button>
        <ul id="messages"></ul>
    </div>

    <script>
        let ws;

        function connect() {
            const user = document.getElementById("username").value;
            ws = new WebSocket(`ws://localhost:8000/ws?username=${user}`);
            ws.onopen = () => document.getElementById("chat").style.display = "block";
            ws.onmessage = (e) => {
                const msg = document.createElement("li");
                msg.textContent = e.data;
                document.getElementById("messages").appendChild(msg);
            };
        }

        function send() {
            const input = document.getElementById("messageInput");
            if (input.value.trim()) {
                ws.send(input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
